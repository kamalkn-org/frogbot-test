name: "Frogbot Scan Pull Request"

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read
  id-token: write

jobs:
  scan-pull-request:
    runs-on: ubuntu-latest
    environment: frogbot
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - uses: jfrog/frogbot@v3
        with:
          oidc-provider-name: kamal-github
          oidc-audience: https://hts2.jfrog.io
        env:
          JF_URL: https://hts2.jfrog.io
          JF_GIT_TOKEN: ${{ secrets.JF_GIT_TOKEN }}
